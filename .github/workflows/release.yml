name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # <-- вот это разрешение

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'   # замените на реальную существующую версию

      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -o myapp.exe main.go

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: myapp.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}